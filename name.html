<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姓名學 - 免費姓名筆畫吉凶分析 | 天機命理</title>
  <meta name="description" content="免費姓名學分析！輸入姓名，自動計算天格人格地格外格總格，五行吉凶一目瞭然。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="index.html" class="site-logo">☯ 天機命理</a>
      <div class="nav-links">
        <a href="bazi.html">八字排盤</a>
        <a href="qimen.html">奇門遁甲</a>
        <a href="name.html" class="active">姓名學</a>
        <a href="daily.html">每日運勢</a>
      </div>
    </nav>
  </header>

  <div class="page-container">
    <h1 class="page-title">📝 姓名學分析</h1>
    <p class="page-subtitle">五格剖象法 · 康熙字典筆畫 · 姓名吉凶</p>

    <div class="info-box">
      <div class="form-group">
        <label>請輸入姓名（2-4個字）</label>
        <input type="text" id="name-input" placeholder="例：王大明" maxlength="4" style="font-size:1.3rem;text-align:center;letter-spacing:0.5rem;">
      </div>
      <button class="btn btn-center" onclick="doName()">開始分析 ✦</button>
    </div>

    <div id="result" class="result-section">
      <!-- Character strokes -->
      <div id="char-strokes" style="display:flex;justify-content:center;gap:1.5rem;margin-bottom:1.5rem;"></div>

      <!-- Five grids -->
      <div class="name-grid" id="name-grid"></div>

      <!-- Interpretation -->
      <div class="info-box" id="name-interp"></div>

      <div style="text-align:center;margin-top:2rem;">
        <button class="btn btn-paid" onclick="alert('詳批報告功能即將推出，敬請期待！')">🔒 取得改名建議報告（即將推出）</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="disclaimer">⚠️ 本網站僅供娛樂參考，不構成任何專業建議。</p>
  </footer>

  <script src="js/lunar.js"></script>
  <script src="js/name.js"></script>
  <script>
    function doName() {
      const name = document.getElementById('name-input').value.trim();
      if (name.length < 2 || name.length > 4) {
        alert('請輸入2-4個字的姓名');
        return;
      }

      const result = NameAnalysis.calculate(name);
      if (result.error) { alert(result.error); return; }
      renderName(result);
    }

    // Allow Enter key
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doName();
    });

    function renderName(r) {
      document.getElementById('result').classList.add('visible');

      // Character strokes
      let html = '';
      r.chars.forEach(c => {
        html += `<div style="text-align:center;">
          <div style="font-size:2.5rem;color:var(--gold);font-family:'Noto Serif TC',serif;">${c.char}</div>
          <div style="color:var(--text-secondary);font-size:0.85rem;">${c.strokes} 畫</div>
        </div>`;
      });
      document.getElementById('char-strokes').innerHTML = html;

      // Five grids
      const wxColors = {'金':'#e0e0e0','木':'#4CAF50','水':'#2196F3','火':'#f44336','土':'#FF9800'};
      html = '';
      r.grids.forEach(g => {
        const fClass = g.fortune === '吉' ? 'fortune-ji' : g.fortune === '凶' ? 'fortune-xiong' : 'fortune-ban';
        html += `<div class="name-cell">
          <div class="ge-name">${g.name}</div>
          <div class="strokes">${g.value}</div>
          <div class="fortune ${fClass}">${g.fortune}</div>
          <div style="color:${wxColors[g.wuxing]};font-size:0.85rem;margin-top:0.3rem;">五行：${g.wuxing}</div>
          <div style="color:var(--text-muted);font-size:0.75rem;margin-top:0.3rem;">${g.desc}</div>
        </div>`;
      });
      document.getElementById('name-grid').innerHTML = html;

      // Interpretation
      document.getElementById('name-interp').innerHTML = `
        <h4>📖 綜合分析</h4>
        <p>${r.interpretation.replace(/\n/g,'<br>')}</p>`;
    }
  </script>
</body>
</html>
