<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇門遁甲排盤 - 免費線上時家奇門 | 天機命理</title>
  <meta name="description" content="免費奇門遁甲排盤！時家奇門，九宮八卦，天地人神四盤合一。帝王之術，預測吉凶方位。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="index.html" class="site-logo">☯ 天機命理</a>
      <div class="nav-links">
        <a href="bazi.html">八字排盤</a>
        <a href="qimen.html" class="active">奇門遁甲</a>
        <a href="name.html">姓名學</a>
        <a href="daily.html">每日運勢</a>
      </div>
    </nav>
  </header>

  <div class="page-container">
    <h1 class="page-title">🔮 奇門遁甲排盤</h1>
    <p class="page-subtitle">帝王之術 · 時家奇門 · 九宮飛布</p>

    <div class="info-box">
      <div class="form-row">
        <div class="form-group">
          <label>年（西元）</label>
          <input type="number" id="qm-year" min="1920" max="2050" placeholder="2026">
        </div>
        <div class="form-group">
          <label>月</label>
          <select id="qm-month"></select>
        </div>
        <div class="form-group">
          <label>日</label>
          <select id="qm-day"></select>
        </div>
        <div class="form-group">
          <label>時</label>
          <select id="qm-hour">
            <option value="0">子時 (23-01)</option>
            <option value="1">丑時 (01-03)</option>
            <option value="3">寅時 (03-05)</option>
            <option value="5">卯時 (05-07)</option>
            <option value="7">辰時 (07-09)</option>
            <option value="9">巳時 (09-11)</option>
            <option value="11">午時 (11-13)</option>
            <option value="13">未時 (13-15)</option>
            <option value="15">申時 (15-17)</option>
            <option value="17">酉時 (17-19)</option>
            <option value="19">戌時 (19-21)</option>
            <option value="21">亥時 (21-23)</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="useNow()" style="margin-right:0.5rem;">📌 用現在時間</button>
      <button class="btn btn-center" onclick="doQiMen()">起局排盤 ✦</button>
    </div>

    <div id="result" class="result-section">
      <div id="qm-info" style="text-align:center;margin-bottom:1rem;"></div>
      <div class="qimen-grid" id="qm-grid"></div>
      <div id="qm-interp"></div>
      <div style="text-align:center;margin-top:2rem;">
        <button class="btn btn-paid" onclick="alert('詳批報告功能即將推出，敬請期待！')">🔒 取得完整分析報告（即將推出）</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="disclaimer">⚠️ 本網站僅供娛樂參考，不構成任何專業建議。</p>
  </footer>

  <script src="js/lunar.js"></script>
  <script src="js/qimen.js"></script>
  <script>
    // Populate selects
    const now = new Date();
    const mSel = document.getElementById('qm-month');
    const dSel = document.getElementById('qm-day');
    for (let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'月';mSel.appendChild(o);}
    for (let i=1;i<=31;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';dSel.appendChild(o);}
    document.getElementById('qm-year').value = now.getFullYear();
    mSel.value = now.getMonth()+1;
    dSel.value = now.getDate();

    function useNow() {
      const n = new Date();
      document.getElementById('qm-year').value = n.getFullYear();
      document.getElementById('qm-month').value = n.getMonth()+1;
      document.getElementById('qm-day').value = n.getDate();
      const h = n.getHours();
      // Find closest 時辰
      const hourSel = document.getElementById('qm-hour');
      const vals = [...hourSel.options].map(o=>parseInt(o.value));
      let best = 0;
      for (const v of vals) { if (h >= v) best = v; }
      hourSel.value = best;
    }

    function doQiMen() {
      const year = parseInt(document.getElementById('qm-year').value);
      const month = parseInt(document.getElementById('qm-month').value);
      const day = parseInt(document.getElementById('qm-day').value);
      const hour = parseInt(document.getElementById('qm-hour').value);

      const result = QiMen.calculate(year, month, day, hour);
      renderQiMen(result);
    }

    function renderQiMen(r) {
      document.getElementById('result').classList.add('visible');

      // Info
      document.getElementById('qm-info').innerHTML = `
        <span style="color:var(--gold);font-size:1.1rem;">
          ${r.yangDun?'陽遁':'陰遁'}${r.juShu}局 · ${r.yuan} · ${r.termName}節氣
        </span><br>
        <span style="color:var(--text-secondary);">
          日柱：${r.dayPillar}　時柱：${r.hourPillar}　值符星：${r.zhiFuStar}
        </span>`;

      // Nine palaces grid
      // Display order: SE(3) S(8) SW(1) / E(2) C(4) W(6) / NE(7) N(0) NW(5)
      // Mapping: grid position to palace index
      // Standard QiMen layout:
      // 巽4(SE)  離9(S)  坤2(SW)
      // 震3(E)   中5(C)  兌7(W)
      // 艮8(NE)  坎1(N)  乾6(NW)
      const gridOrder = [3, 8, 1, 2, 4, 6, 7, 0, 5]; // palace indices for grid cells

      let html = '';
      gridOrder.forEach(pi => {
        const p = r.palaces[pi];
        const isCenter = pi === 4;
        html += `<div class="palace ${isCenter?'palace-center':''}">
          <div class="palace-num">${p.name}</div>
          ${p.deity ? `<div class="deity">神:${p.deity}</div>` : ''}
          ${p.star ? `<div class="star">星:${p.star}</div>` : ''}
          ${p.door ? `<div class="door">門:${p.door}</div>` : ''}
          <div class="stem">天:${p.tianGan || '-'} 地:${p.diGan || '-'}</div>
        </div>`;
      });
      document.getElementById('qm-grid').innerHTML = html;

      // Interpretations
      html = '<div class="info-box"><h4>📖 各宮解讀</h4>';
      r.palaces.forEach((p, i) => {
        if (i === 4) return;
        html += `<p><strong style="color:var(--gold)">${p.name}（${p.position}）</strong>：${r.interpretations[i]}</p>`;
      });
      html += '</div>';
      document.getElementById('qm-interp').innerHTML = html;
    }

    useNow();
  </script>
</body>
</html>
